<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

    <title>Dom projects</title>
    <style>
        body{
            font-family: Arial;
        }
        .subscribe-button{
            
            border: none;
            background-color: black;
            color: white;
            padding: 10px 15px 10px 15px;
            font-weight: bold;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 30px;
        }
        .is-subscribed{
            background-color: rgb(240, 240, 240);
            color: black;
        }

        .cost-input{
            font-size: 15px;
            padding: 10px;
            border: none;
            border: 1px solid rgb(100, 100, 100);
            border-radius: 3px;
        }
        .calculate-button{
            background-color: green;
            color: white;
            font-size: 15px;
            padding: 12px 15px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
    </style>

</head>
<body>
    <p>YouTube Subscribe Button</p>
    <button class="js-subscribe-button subscribe-button" onclick="
        subscribe();
    ">
        Subscribe
    </button>


    <!--amazon shipping project-->
    <p>Amazon Shipping Calculator</p>
    <p>Order under $40 = +$10 shipping</p>
    <p>Order over $40 = FREE shipping</p>
    <input class="js-cost-input cost-input" placeholder="Cost of order" onkeydown="
        handleCostKeydown(event);
    ">
    <button class="calculate-button" onclick="
        calculateTotal();
    ">Calculate</button>
    <p class="js-total-cost"></p>

    <script>
        //more topics of js:
        String(23);
        console.log('23' - 3);
        console.log('23' + 3);

        window.document
        window.console.log('window');
        

        function handleCostKeydown(event){
            if(event.key === 'Enter'){
                calculateTotal();
            }else{
                console.log(event.key);
            }
        }



        function calculateTotal(){
            const inputElement = document.querySelector('.js-cost-input');
            let cost= Number(inputElement.value);
            
            if(cost<40){
                cost = cost + 10;
            }

            document.querySelector('.js-total-cost').innerHTML = `$${cost}`;
        }


        function subscribe(){
            const buttonElement = document.querySelector('.js-subscribe-button');
            // console.log(buttonElement);

            if(buttonElement.innerText === 'Subscribe'){
                buttonElement.innerHTML = 'Subscribed';

                buttonElement.classList.add('is-subscribed');
            }
            else{
                buttonElement.innerHTML = 'Subscribe';
                buttonElement.classList.remove('is-subscribed');
            }
        }
        
    </script>
</body>
</html>
