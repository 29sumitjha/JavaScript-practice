    <script>
        console.log(typeof true);

        console.log(3<5);

        if(false){

            console.log('else');

        const age = 15;

        //Logical operator
        console.log(true && true);

        //truthy and falsy values

            console.log('thruthy');
        }
        if(0){

        }

        //ternany operator
        const result = true ? 'truthy' : 'else';

        //guard operator:
            false && console.log('hrllo'); //console.log(will never run, which means and operator stops early)

            //usecase:
            const message1 = false && 'hello';
            console.log(message1); //false
            const message2 = false && 'hello';
            console.log(message2); //hello
        //******************************

        //default operator:
            true || 0; //also stops early

            //usecase:
            const currency1 = 'EUR' || 'USD';
            console.log(currency1); //EUR

            console.log(currency1); //USD
