        //MORE FEATURES OF FUNCTIONS AS VALUE
            //another way to loop through an array [forEach() method]:
            [
                'make dinner',
                'wash dishes',
                'watch youtube'
            ].forEach(function(value, index){

                //In foreach() method we cannot use "continue", so "return" does the same thing as continue.
                if(value === 'wash dishes'){
                    return;
                }
                console.log(index);
                console.log(value);
