<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Calculator</title>
    <link rel="stylesheet" href="10i-calculatorStyling.css">
</head>
<body>
    <p class="js-show-calculation"></p>
    
    <p>
        <button onclick="
            updateCalculation('1');
        ">1</button>
        <button onclick="
            updateCalculation('2');
        ">2</button>
        <button onclick="
            updateCalculation('3');
        ">3</button>
        <button class="operator-button" onclick="
            updateCalculation(' + ');
        ">+</button>
    </p>

    <p>
        <button onclick="
            updateCalculation('4');
        ">4</button>
        <button onclick="
            updateCalculation('5');
        ">5</button>
        <button onclick="
            updateCalculation('6');
        ">6</button>
        <button class="operator-button" onclick="
            updateCalculation(' - ');
        ">-</button>
    </p>

    <p>
        <button onclick="
            updateCalculation('7');
        ">7</button>
        <button onclick="
            updateCalculation('8');
        ">8</button>
        <button onclick="
            updateCalculation('9');
        ">9</button>
        <button class="operator-button" onclick="
            updateCalculation(' * ');
        ">*</button>
    </p>

    <p>
        <button onclick="
            updateCalculation('0');
        ">0</button>
        <button onclick="
            updateCalculation('.');
        ">.</button>
        <button onclick="
            calculation = eval(calculation);
            //console.log(calculation);
            displayCalculation();

            localStorage.setItem('calculationStore', calculation);

        ">=</button>
        <button class="operator-button" onclick="
            updateCalculation(' / ');
        ">/</button>
    </p>

    <p>
        <button class="clear-button" onclick="
            calculation = '';
            //console.log(calculation);
            displayCalculation();
            
            localStorage.setItem('calculationStore', calculation);
        ">
            Clear
        </button>
    </p>

    <script src="10i-calculatorStyling.js"> </script>
</body>
</html>
