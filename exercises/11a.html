        //11c
        function arraySwap(array){

            const lastIndex = array.length -1;
            let lastValue = array[lastIndex];
            const firstValue = array[0];

            array[0] = lastValue;
            array[lastIndex] = firstValue;

            return array;
        }
        console.log(arraySwap([1,2,3,4,5]));

        function addOne(array){

            for(let i=0; i<array.length; i++){

        console.log(addOne([-2, -1, 0, 99]));

        //11i
        function addNum(array, num){
            let newArray = [];

            }
            return newArray;
        }
        console.log(addNum([0,-1,8] , 5));

        //11j
        function addArrays(array1, array2){
            let result = [];

            return result;

        console.log(addArrays([1,1,12], [1,1,3]));

        //11k 
        function countPositive(nums){
            let totalCount = 0;

            for(let i=0; i<nums.length; i++){
                if(nums[i] > 0){
                    totalCount++;
                }
            }
            return totalCount;
        }
        console.log(countPositive([1,2,3,-23,6,-75]));

        //11l
        function minMax(nums){

            const result = {
                min: nums[0],
                max: nums[0],
            }
            
            for(let i=0; i<nums.length; i++){
                if(nums[i] < result.min){
                    result.min = nums[i];
                }
                if(nums[i] > result.max){
                    result.max = nums[i];
                }
            }
            return result;
        }
        console.log(minMax([1, -3, 5]));
        console.log(minMax([1,2,3,43,-1,45, 200, -234 ]));
        console.log(minMax([])); //undefined
        console.log('***************************');


        //11m
        function minMaxOptimized(nums){

            const result = {
                min: null,
                max: null,
            }
            
            for(let i=0; i<nums.length; i++){
                if(result.min === null || nums[i] < result.min){
                    result.min = nums[i];
                }
                if(result.max === null || nums[i] > result.max){
                    result.max = nums[i];
                }
            }
            return result;
        }
        console.log(minMaxOptimized([1, -3, 5]));
        console.log(minMaxOptimized([]));
        console.log(minMaxOptimized([3]));


        //11n. Array and Loops Part -1
        const wordsArray = ['apple', 'car', 'cat', 'bike'];

        function countWords(words){

            const result = {};

            for(let i=0; i<words.length; i++){
                const eachWord = words[i];

                let countLetters = 0;
                for(let i=0; i<eachWord.length; i++){
                    countLetters++;
                }
                result[words[i]] = countLetters;
            }
            return result;
            
        }
        console.log(countWords(wordsArray));

        //11r
        function removeEggs(food){
            const result = [];
            for(let i=0; i<food.length; i++){
                if(food[i] === 'egg'){
                    continue;
                }
                else{
                    result.push(food[i]);
                }
            }
            return result;
        }
        console.log(removeEggs(['apple','egg','mango', 'egg','biscuits']));

        //11s
        function removeFirstTwoEggs(food){
            const result = [];
            let eggCount = 0;

            for(let i=0; i<food.length; i++){
                if((food[i] === 'egg') && (eggCount < 2)){
                    eggCount++;
                    continue;
                }
                else{
                    result.push(food[i]);
                }
            }
            return result;
        }
        console.log(removeFirstTwoEggs(['apple','egg','mango', 'egg','sprite','egg']));
        

        //11t and 11u 
        function removeLastTwoEggs(food){
            // console.log(food);

            const copyArray = food.slice();
            console.log(copyArray);

            const foodArrayReversed = copyArray.reverse();
            // console.log(food);
            console.log(foodArrayReversed);

            const result = [];
            let eggCount = 0;

            for(let i=0; i<foodArrayReversed.length; i++){
                if((foodArrayReversed[i] === 'egg') && (eggCount < 2)){
                    eggCount++;
                    continue;
                }
                else{
                    result.push(foodArrayReversed[i]);
                }
            }
            return result.reverse();
        }
        console.log(removeLastTwoEggs(['ham','apple','egg','mango', 'egg','sprite','egg']));

        //11w
        function findIndex2(array, word){
            for(let i=0; i<array.length; i++){
                if(array[i] === word){
                    return i;
                }
            }
            return -1;
        }
        function unique(array){
            const result = [];
            for(let i=0; i<array.length; i++){
            
                const word = array[i];

                if(findIndex2(result, word) === -1){
                    result.push(word);
                }
            }
            return result;
        }
        console.log(unique(['green', 'red', 'blue', 'red']));
        console.log(unique(['red', 'green', 'green', 'red']));
