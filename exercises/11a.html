<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
</head>
<body>
    <script>
        //11a
        const nums = [10,20,30];
        nums[2] = 99;
        console.log(nums);

        //11b
        function getLastValue(array){
            const lastIndex = array.length - 1;
            return array[lastIndex];
        }
        console.log(getLastValue(nums));

        //11c
        function arraySwap(array){

            const lastIndex = array.length -1;
            let lastValue = array[lastIndex];
            const firstValue = array[0];

            array[0] = lastValue;
            array[lastIndex] = firstValue;

            return array;
        }
        console.log(arraySwap([1,2,3,4,5]));


        //11d
        for(let i=0; i<=10; i+=2){
            console.log(i);
        }

        //11e
        for(let i=5; i>=0; i--){
            console.log(i);
        }

        //11f
        let i=0;
        while(i<=10){
            console.log(i);
            i +=2;
        }

        let j=5;
        while(j>=0){
            console.log(j);
            j--;
        }

        //11g
        let arr = [1,2,3,4];
        let newArr = [];
        for(let i=0; i<arr.length; i++){
            newArr.push(arr[i]+1);
        }
        console.log(newArr);

        //11h
        function addOne(array){
            let newArray = [];
            for(let i=0; i<array.length; i++){
                newArray.push(array[i]+1);
            }
            return newArray;
        }
        console.log(addOne([-2, -1, 0, 99]));

        //11i
        function addNum(array, num){
            let newArray = [];
            for(let i=0; i<array.length; i++){
                newArray.push(array[i]+num);
            }
            return newArray;
        }
        console.log(addNum([0,-1,8] , 5));

        //11j
        function addArrays(array1, array2){
            let result = [];
            for(let i=0; i<array1.length; i++){
                result.push( array1[i] + array2[i] ); 
            }
            return result;
        }
        console.log(addArrays([1,1,12], [1,1,3]));

        //11k 
        function countPositive(nums){
            let totalCount = 0;

            for(let i=0; i<nums.length; i++){
                if(nums[i] > 0){
                    totalCount++;
                }
            }
            return totalCount;
        }
        console.log(countPositive([1,2,3,-23,6,-75]));

        //11l
        function minMax(nums){

            const result = {
                min: nums[0],
                max: nums[0],
            }
            
            for(let i=0; i<nums.length; i++){
                if(nums[i] < result.min){
                    result.min = nums[i];
                }
                if(nums[i] > result.max){
                    result.max = nums[i];
                }
            }
            return result;
        }
        console.log(minMax([1, -3, 5]));
        console.log(minMax([1,2,3,43,-1,45, 200, -234 ]));
        console.log(minMax([])); //undefined
        console.log('***************************');


        //11m
        function minMaxOptimized(nums){

            const result = {
                min: null,
                max: null,
            }
            
            for(let i=0; i<nums.length; i++){
                if(result.min === null || nums[i] < result.min){
                    result.min = nums[i];
                }
                if(result.max === null || nums[i] > result.max){
                    result.max = nums[i];
                }
            }
            return result;
        }
        console.log(minMaxOptimized([1, -3, 5]));
        console.log(minMaxOptimized([]));
        console.log(minMaxOptimized([3]));


        //11n. Array and Loops Part -1
        const wordsArray = ['apple', 'car', 'cat', 'bike'];

        function countWords(words){

            const result = {};

            for(let i=0; i<words.length; i++){
                const eachWord = words[i];

                let countLetters = 0;
                for(let i=0; i<eachWord.length; i++){
                    countLetters++;
                }
                result[words[i]] = countLetters;
            }
            return result;
            
        }
        console.log(countWords(wordsArray));

    </script>
    
    
</body>
