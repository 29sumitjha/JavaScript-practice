<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROCK PAPER SCISSOR GAME</title>
    <link rel="stylesheet" href="12r.css">
</head>
<body>
    <p class="title">Rock Paper Scissors</p>

    <!--Rock button-->
    <button class="move-button js-rock-button" >
        <img class="move-icon" src="/images/rock-emoji.png">
    </button>

    <!--Paper button-->
    <button class="move-button js-paper-button">
        <img class="move-icon" src="/images/paper-emoji.png">
    </button>

    <!--scissors button-->
    <button class="move-button js-scissors-button">
        <img class="move-icon" src="/images/scissors-emoji.png">
    </button>


    <p class="js-result result"></p>
    <p class="js-moves"></p>

    <!--score display area-->
    <p class="js-score score"></p>




    <button class="reset-score-button js-reset-score-button" >
        Reset score
    </button>

    <button class="js-auto-play auto-play-button">
        Auto Play
    </button>

    <p class="js-reset-confirmation"></p>


    <script src="12r.js"></script>
</body>
</html>
