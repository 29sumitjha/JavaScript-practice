<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title class="js-title">App</title>
</head>
<body>
    <!-- 12c -->
    <button class="js-start-button">Start</button>

    <!-- 12e -->
    <button class="js-add-to-cart-button">Add to cart</button>
    <p class="js-show-added-message"></p>

    <!-- 12h -->
    <button onclick="
        messages++;
        displayNotification();
    ">Add</button>
    <button onclick="
        if (messages > 0) {
            messages--;
            if (messages === 0) {
            stopNotification();
            }
        }

    ">Remove</button>

    <script>
        //12a
        const add = function(){
            console.log(2+3);
        }
        console.log(add);
        add();
        add();

        //12b
        function runTwice(fun){
            fun();
            fun();
        }
        runTwice(function(){
            console.log('12b');
        })
        runTwice(add);


        //12c to 12d
        document.querySelector('.js-start-button')
            .addEventListener('click',()=>{
                changeButtonText();
            })
        function changeButtonText(){
            const startButton = document.querySelector('.js-start-button');

            startButton.innerHTML = 'Loading...';

            setTimeout(()=>{
                startButton.innerHTML = 'Finished!';
            }, 1000);
        }

        //12e to 12f
        document.querySelector('.js-add-to-cart-button')
            .addEventListener('click',()=>{
                addToCartButton();
            })
        let timeoutId;

        function addToCartButton(){
            const messageElement = document.querySelector('.js-show-added-message');
            messageElement.innerHTML = 'Added';

            clearTimeout(timeoutId);
          
            timeoutId = setTimeout(()=>{
                messageElement.innerHTML = '';
            }, 2000);
        }

        //12g to 12i
        let messages = 2;
        let intervalId;
        let isDisplayingNotification;

        function displayNotification(){
            if (isDisplayingNotification) {
                return;
            }

            isDisplayingNotification = true;

            intervalId = setInterval(()=>{
                if (document.title === 'App') {
                    document.title = `(${messages}) New messages`;
                } 
                else{
                    document.title = 'App';
                }
            }, 1000);
        }

        function stopNotification() {
            isDisplayingNotification = false;

            clearInterval(intervalId);
            document.title = 'App';
        }
        
        //12j - 12k
        const multiply = (a,b) => a * b;
        console.log(multiply(12,2));

        //12l
        function countPositive(nums){
            let count = 0;
            nums.forEach((value)=>{
                if(value >=0){
                    count++;
                }
            });
            return count;
        }
        console.log(countPositive([1,2,-3,-4,8,9,0,-47,4,-9]));

        //12m
        function addNum(array, num){
            return array.map(value => value + num);
            
        }
        console.log(addNum([1,2,3],4));

        //12n, 12o
        function removeEgg(foods){
            let eggCount = 0;
            const newFood = foods.filter((value) =>{
                if(value === 'egg' && eggCount < 2){
                    eggCount++;
                    return false;
                }
                else{
                    return true;
                }
            })
            return newFood;
        }
        console.log(removeEgg(['egg','banana','apple','egg','egg','tomato','sweet potato', 'egg','corn']));


    </script>
</body>
</html>
