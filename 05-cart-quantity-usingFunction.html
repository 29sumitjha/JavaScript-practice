<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function excercise</title>
</head>
<body>
    <p>Cart Quantity</p>

    <button onclick="
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Show Quantity
    </button>

    <button onclick="
        updateCartQuantity(1);
    ">
        Add to cart
    </button>

    <button onclick="
        updateCartQuantity(2);
    ">
        +2
    </button>

    <button onclick="
        updateCartQuantity(3);
    ">
        +3
    </button>

    <!--5 h -->
    <button onclick="
        updateCartQuantity(4);
    ">
        +4
    </button>

    <button onclick="
        updateCartQuantity(5);
    ">
        +5
    </button>
    

    <button onclick="
        cartQuantity = 0;
        console.log('cart was reset.');
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Reset cart
    </button>

    <!--5i-->
    <button onclick="
        updateCartQuantity(-1);
    ">
        Remove From cart
    </button>

    <button onclick="
        updateCartQuantity(-2);
    ">
        -2
    </button>

    <button onclick="
        updateCartQuantity(-3);
    ">
        -3
    </button>

    <script>
        let cartQuantity = 0;

        function updateCartQuantity(change) {
            if (cartQuantity + change > 10) {
                alert('The cart is full');
                return;
            } 
            else if (cartQuantity + change < 0) {
                alert('Not enough items in the cart');
                return;
            } 
            
            cartQuantity += change;
            console.log(`Cart quantity: ${cartQuantity}`);
            
        }

    </script>
</body>
</html>
