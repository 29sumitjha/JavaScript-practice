<body>
    <script>
        let randomNumber = Math.random();
        // let result = '';
        let guess = 'Head';

        let result = (randomNumber < 0.5) ? 'Head' : 'Tails';

        console.log(result);

        if(guess === result){

        }
        else{
            console.log('You lose');
        }
    </script>
