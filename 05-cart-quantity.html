<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Variables excercise</title>
</head>
<body>
    <p>Cart Quantity</p>

    <button onclick="
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Show Quantity
    </button>

    <button onclick="
        cartQuantity = cartQuantity + 1;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Add to cart
    </button>

    <button onclick="
        cartQuantity = cartQuantity + 2;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        +2
    </button>

    <button onclick="
        cartQuantity = cartQuantity + 3;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        +3
    </button>

    <!--5 h -->
    <button onclick="
        cartQuantity += 4;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        +4
    </button>

    <button onclick="
        cartQuantity += 5;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        +5
    </button>
    

    <button onclick="
        cartQuantity = 0;
        console.log('cart was reset.');
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Reset cart
    </button>

    <!--5i-->
    <button onclick="
        cartQuantity --;
        console.log(`Cart quantity : ${cartQuantity}`);
    ">
        Remove From cart
    </button>

    <script>
        let cartQuantity = 0;

    </script>
</body>
</html>
